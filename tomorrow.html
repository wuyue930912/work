<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明天工作计划</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px 50px;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .date {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 40px;
        }
        .task {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            border-left: 5px solid #667eea;
        }
        .task:hover {
            transform: translateX(10px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .task:nth-child(2) { border-left-color: #f093fb; }
        .task:nth-child(3) { border-left-color: #4facfe; }
        .task:nth-child(4) { border-left-color: #43e97b; }
        .number {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            margin-right: 20px;
            flex-shrink: 0;
        }
        .content h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 5px;
        }
        .content p {
            color: #888;
            font-size: 14px;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #aaa;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 明日工作计划</h1>
        <p class="date">2026年3月11日 · 星期三</p>
        
        <div class="task">
            <div class="number">1</div>
            <div class="content">
                <h3>📈 上证自动化</h3>
                <p>完成自动盯盘脚本搭建与测试</p>
            </div>
        </div>
        
        <div class="task">
            <div class="number">2</div>
            <div class="content">
                <h3>🎵 AI歌手创作</h3>
                <p>探索AI生成音乐与歌声合成</p>
            </div>
        </div>
        
        <div class="task">
            <div class="number">3</div>
            <div class="content">
                <h3>💧 喝水减肥</h3>
                <p>记录饮水习惯与体重变化</p>
            </div>
        </div>
        
        <p class="footer">加油！💪</p>
    </div>
</body>
</html>
